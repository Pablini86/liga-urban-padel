<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="format-detection" content="telephone=no, address=no, email=no">
<title>Urban Padel Life</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{--black:#080808;--dark:#111;--card:#161616;--card2:#1c1c1c;--border:#242424;--border2:#303030;--accent:#d4f000;--accent2:#ff3b5c;--accent3:#00e59e;--text:#efefef;--muted:#505050;--muted2:#888;--gold:#ffd700;--silver:#b8b8b8;--bronze:#cd7f32;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--black);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;}
a{color:inherit;text-decoration:none;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:54px;background:rgba(8,8,8,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--accent);cursor:pointer;}
.logo span{color:var(--text);}
.nav-right{display:flex;align-items:center;gap:.5rem;}
.back-btn{display:none;align-items:center;gap:.4rem;padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:'Outfit',sans-serif;font-size:.78rem;cursor:pointer;transition:all .15s;}
.back-btn:hover{color:var(--text);}
.back-btn.show{display:flex;}
.nav-liga-name{display:none;font-size:.78rem;font-weight:600;color:var(--text);}
.nav-liga-name.show{display:block;}

main{margin-top:54px;padding:1.2rem;max-width:1200px;margin-left:auto;margin-right:auto;}

/* VIEWS */
.view{display:none;}
.view.active{display:block;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* HOME */
.home-hero{padding:2rem 0 1.5rem;text-align:center;}
.home-hero h1{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;letter-spacing:6px;line-height:1;margin-bottom:.25rem;}
.home-hero h1 span{color:var(--accent);}
.home-hero p{font-size:.82rem;color:var(--muted2);}
.leagues-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;margin-top:1.5rem;}
.league-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.league-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.league-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
.lc-status{display:inline-flex;align-items:center;gap:.4rem;font-size:.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent3);margin-bottom:.85rem;}
.lc-dot{width:6px;height:6px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.lc-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;line-height:1;margin-bottom:.3rem;}
.lc-dia{font-size:.8rem;color:var(--muted2);margin-bottom:1rem;}
.lc-arrow{position:absolute;right:1.2rem;bottom:1.2rem;color:var(--accent);font-size:1.2rem;}
.lc-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:700;letter-spacing:1px;background:rgba(212,240,0,.08);color:var(--accent);border:1px solid rgba(212,240,0,.2);}

/* LIGA VIEW */
.liga-header{padding:1.2rem 0 1rem;border-bottom:1px solid var(--border);margin-bottom:1.2rem;}
.liga-header h1{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:4px;line-height:1;}
.liga-header h1 em{color:var(--accent);font-style:normal;}
.liga-header p{font-size:.78rem;color:var(--muted2);margin-top:.2rem;}
.liga-tabs{display:flex;gap:2px;margin-bottom:1.3rem;border-bottom:1px solid var(--border);}
.lt{padding:8px 14px;border:none;background:transparent;color:var(--muted2);font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;}
.lt:hover{color:var(--text);}
.lt.active{color:var(--accent);border-bottom-color:var(--accent);}
.ltab{display:none;}
.ltab.active{display:block;}

/* TOP 10 */
.top10-row{display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;border-radius:9px;background:var(--card);border:1px solid var(--border);margin-bottom:.3rem;cursor:pointer;transition:border-color .15s;}
.top10-row:hover{border-color:var(--border2);}
.top10-row.gold{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.04);}
.top10-row.silver{border-color:rgba(184,184,184,.2);}
.top10-row.bronze{border-color:rgba(205,127,50,.2);}
.top10-rank{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;min-width:28px;text-align:center;}
.top10-av{width:34px;height:34px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--accent);flex-shrink:0;}
.top10-info{flex:1;}
.top10-name{font-weight:600;font-size:.9rem;}
.top10-sub{font-size:.68rem;color:var(--muted2);}
.top10-pts{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--accent);}

/* TABLA GENERAL */
.tw{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:.8rem;}
thead tr{border-bottom:2px solid var(--accent);}
th{padding:.55rem .6rem;text-align:left;font-size:.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
th.acc{color:var(--accent);}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
tbody tr:hover{background:rgba(255,255,255,.02);}
tbody tr:last-child{border-bottom:none;}
tbody tr.top1{background:rgba(255,215,0,.03);}
td{padding:.5rem .6rem;white-space:nowrap;}
td.pos{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--muted);}
td.pv{color:var(--accent);font-weight:600;}
td.nv{color:var(--accent2);font-weight:600;}
td.tot{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;}
.gr{display:inline-block;background:var(--border2);color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:.8rem;padding:0 4px;border-radius:3px;}

/* JORNADAS */
.jornada-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:.85rem;overflow:hidden;}
.jc-header{padding:.85rem 1rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s;}
.jc-header:hover{background:rgba(255,255,255,.02);}
.jc-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;}
.jc-meta{font-size:.7rem;color:var(--muted2);margin-top:.1rem;}
.jc-badge{padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:700;}
.jc-done{background:rgba(0,229,158,.08);color:var(--accent3);border:1px solid rgba(0,229,158,.2);}
.jc-pending{background:rgba(212,240,0,.06);color:var(--accent);border:1px solid rgba(212,240,0,.15);}
.jc-empty{background:rgba(255,255,255,.04);color:var(--muted2);border:1px solid var(--border);}
.jc-body{display:none;border-top:1px solid var(--border);}
.jc-body.open{display:block;}
.jc-empty-msg{padding:1.5rem;text-align:center;color:var(--muted2);font-size:.8rem;}

/* GRUPOS EN JORNADA */
.grupo-block{border-bottom:1px solid var(--border);padding:.85rem 1rem;}
.grupo-block:last-child{border-bottom:none;}
.grupo-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--accent);margin-bottom:.55rem;}
.set-row{display:grid;grid-template-columns:1fr auto auto auto 1fr;gap:.4rem;align-items:center;margin-bottom:.3rem;font-size:.8rem;}
.set-label{font-size:.6rem;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;grid-column:1/-1;margin-bottom:.1rem;}
.set-team-a{text-align:right;}
.set-team-b{text-align:left;}
.set-sc{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;background:var(--card2);border-radius:4px;padding:1px 6px;min-width:26px;text-align:center;}
.set-sc.win{background:var(--accent);color:var(--black);}
.set-dash{color:var(--muted);font-size:.8rem;}

/* PLAYER MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:200;align-items:flex-end;justify-content:center;padding:0;}
.mo.open{display:flex;animation:moin .22s ease;}
@keyframes moin{from{opacity:0}to{opacity:1}}
.modal{background:var(--dark);border-radius:18px 18px 0 0;padding:1.5rem 1.25rem;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1.2rem;}
.mc{float:right;background:transparent;border:none;color:var(--muted2);font-size:1.2rem;cursor:pointer;margin-top:-4px;}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;margin-bottom:.25rem;}
.modal h2 em{color:var(--accent);font-style:normal;}

/* MISC */
.cl{font-size:.63rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted2);}
.empty-state div{font-size:2.5rem;margin-bottom:.75rem;}
.bar-container{background:var(--border);border-radius:2px;height:4px;flex:1;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .4s ease;}

@media(max-width:600px){
  .home-hero h1{font-size:2.4rem;}
  main{padding:.9rem;}
  .liga-header h1{font-size:2rem;}
  .tw{font-size:.74rem;}
  th,td{padding:.4rem .45rem;}
}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="goHome()">URBAN <span>PADEL</span></div>
  <div class="nav-right">
    <span class="nav-liga-name" id="nav-liga-name"></span>
    <button class="back-btn" id="back-btn" onclick="goHome()">← Ligas</button>
  </div>
</nav>

<main>
  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div class="home-hero">
      <h1>URBAN <span>PADEL</span> LIFE</h1>
      <p>Av. de las Rosas 171 · Col. Chapalita · Guadalajara</p>
    </div>
    <div id="leagues-grid" class="leagues-grid">
      <div class="empty-state"><div>🎾</div><p>Cargando ligas...</p></div>
    </div>
  </div>

  <!-- LIGA VIEW -->
  <div class="view" id="view-liga">
    <div class="liga-header">
      <h1 id="liga-title">LIGA <em>XXIII</em></h1>
      <p id="liga-meta"></p>
    </div>

    <div class="liga-tabs">
      <button class="lt active" onclick="showLT('inicio',this)">🏠 Inicio</button>
      <button class="lt" onclick="showLT('tabla',this)">🏆 Tabla</button>
      <button class="lt" onclick="showLT('jornadas',this)">📅 Jornadas</button>
    </div>

    <!-- INICIO -->
    <div class="ltab active" id="lt-inicio">
      <div id="top10-list"></div>
    </div>

    <!-- TABLA GENERAL -->
    <div class="ltab" id="lt-tabla">
      <div class="tw">
        <table>
          <thead id="tabla-thead">
            <tr>
              <th>#</th>
              <th>Jugador</th>
              <th>Gr</th>
              <th class="acc">Total</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>
    </div>

    <!-- JORNADAS -->
    <div class="ltab" id="lt-jornadas">
      <div id="jornadas-list"></div>
    </div>
  </div>
</main>

<!-- PLAYER MODAL -->
<div class="mo" id="player-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="mc" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyChTCdBwFtsf7rTI4sKvTAGhb83VxdmIDs",
  authDomain:"liga-urban-padel.firebaseapp.com",
  projectId:"liga-urban-padel",
  storageBucket:"liga-urban-padel.firebasestorage.app",
  messagingSenderId:"144742696459",
  appId:"1:144742696459:web:25779ca29faaea2561e90e"
});
const db = firebase.firestore();

// STATE
let S = {ligas:[],players:[],partidos:[],jornadas:[]};
let activeLigaId = null;

// FIRESTORE
db.collection('ligas').onSnapshot(s=>{S.ligas=s.docs.map(d=>({id:d.id,...d.data()}));renderHome();if(activeLigaId)renderLiga(activeLigaId);});
db.collection('players').onSnapshot(s=>{S.players=s.docs.map(d=>({id:d.id,...d.data()}));if(activeLigaId)renderLiga(activeLigaId);});
db.collection('partidos').onSnapshot(s=>{S.partidos=s.docs.map(d=>({id:d.id,...d.data()}));if(activeLigaId)renderLiga(activeLigaId);});
db.collection('jornadas').onSnapshot(s=>{S.jornadas=s.docs.map(d=>({id:d.id,...d.data()}));if(activeLigaId)renderLiga(activeLigaId);});

// HELPERS
const pById=id=>S.players.find(x=>x.id===id);
const pName=id=>{const p=pById(id);return p?p.nombre:'?';};
const pFirst=id=>{const p=pById(id);return p?p.nombre.split(' ')[0]:'?';};

function calcPts(pid,lid,jid){
  const ms=S.partidos.filter(m=>m.jornadaId===jid&&m.finalizado&&[m.a1,m.a2,m.b1,m.b2].includes(pid));
  if(!ms.length)return null;
  const p=pById(pid);
  if(p&&p['ausente_j_'+jid])return -6;
  if(p&&p['direct_j_'+jid]!==undefined)return p['direct_j_'+jid];
  let gf=0,gc=0;
  ms.forEach(m=>{const enA=[m.a1,m.a2].includes(pid);gf+=enA?m.gA:m.gB;gc+=enA?m.gB:m.gA;});
  return gf-gc;
}
function calcTotal(pid,lid){
  return S.jornadas.filter(j=>j.liga===lid).reduce((acc,j)=>{const p=calcPts(pid,lid,j.id);return p!==null?acc+p:acc;},0);
}
function calcGlobal(lid){
  return S.players.filter(p=>p.liga===lid)
    .map(p=>({player:p,total:calcTotal(p.id,lid)}))
    .sort((a,b)=>b.total-a.total);
}

// NAVIGATION
function goHome(){
  activeLigaId=null;
  document.getElementById('view-home').classList.add('active');
  document.getElementById('view-liga').classList.remove('active');
  document.getElementById('back-btn').classList.remove('show');
  document.getElementById('nav-liga-name').classList.remove('show');
  document.getElementById('nav-liga-name').textContent='';
}
function openLiga(lid){
  activeLigaId=lid;
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-liga').classList.add('active');
  document.getElementById('back-btn').classList.add('show');
  const liga=S.ligas.find(l=>l.id===lid);
  document.getElementById('nav-liga-name').textContent=liga?.nombre||'';
  document.getElementById('nav-liga-name').classList.add('show');
  // Reset to inicio tab
  showLT('inicio',document.querySelector('.lt'));
  renderLiga(lid);
}
function showLT(id,btn){
  document.querySelectorAll('.ltab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.lt').forEach(t=>t.classList.remove('active'));
  document.getElementById('lt-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
  if(id==='tabla'&&activeLigaId)renderTabla(activeLigaId);
  if(id==='jornadas'&&activeLigaId)renderJornadas(activeLigaId);
}

// HOME
function renderHome(){
  const el=document.getElementById('leagues-grid');
  if(!el)return;
  if(!S.ligas.length){
    el.innerHTML='<div class="empty-state"><div>🎾</div><p>Sin ligas activas</p></div>';
    return;
  }
  el.innerHTML=S.ligas.filter(l=>l.status!=='archivada').map(l=>{
    const ps=S.players.filter(p=>p.liga===l.id).length;
    const js=S.jornadas.filter(j=>j.liga===l.id);
    const nextJ=js.length+1;
    return`<div class="league-card" onclick="openLiga('${l.id}')">
      <div class="lc-status"><span class="lc-dot"></span>En vivo</div>
      <div class="lc-name">${l.nombre}</div>
      <div class="lc-dia">${l.dia||''} · ${l.cat||'Mixta'}</div>
      <div style="display:flex;gap:.4rem;flex-wrap:wrap">
        <span class="lc-tag">${ps} jugadores</span>
        <span class="lc-tag">${js.length}/${l.nj||6} jornadas</span>
      </div>
      <div class="lc-arrow">→</div>
    </div>`;
  }).join('');
}

// LIGA
function renderLiga(lid){
  const liga=S.ligas.find(l=>l.id===lid);
  if(!liga)return;
  // Header
  const parts=liga.nombre.split(' ');
  document.getElementById('liga-title').innerHTML=parts.slice(0,-1).join(' ')+' <em>'+parts.slice(-1)+'</em>';
  document.getElementById('liga-meta').textContent=(liga.dia||'')+(liga.cat?' · '+liga.cat:'')+(liga.inicio?' · '+liga.inicio:'');
  renderInicio(lid);
}

// INICIO - TOP 10
function renderInicio(lid){
  const el=document.getElementById('top10-list');
  if(!el)return;
  const st=calcGlobal(lid);
  const liga=S.ligas.find(l=>l.id===lid);
  const js=S.jornadas.filter(j=>j.liga===lid).sort((a,b)=>a.num-b.num);

  // Last completed jornada
  const lastJ=[...js].reverse().find(j=>{
    const ms=S.partidos.filter(p=>p.jornadaId===j.id);
    return ms.length>0&&ms.some(m=>m.finalizado&&m.gA!==null);
  });

  // Next jornada (no results yet)
  const nextJ=js.find(j=>{
    const ms=S.partidos.filter(p=>p.jornadaId===j.id);
    return ms.length>0&&!ms.some(m=>m.finalizado&&m.gA!==null);
  });

  let html='';

  // PRÓXIMA JORNADA
  if(nextJ){
    const grupos=[...new Set(S.partidos.filter(p=>p.jornadaId===nextJ.id).map(m=>m.grupo))].sort((a,b)=>a-b);
    const byTurno={};
    S.partidos.filter(p=>p.jornadaId===nextJ.id).forEach(m=>{
      if(!byTurno[m.turno])byTurno[m.turno]=[];
      if(!byTurno[m.turno].find(x=>x.grupo===m.grupo))byTurno[m.turno].push({grupo:m.grupo,cancha:m.cancha});
    });
    const turnos=Object.keys(byTurno).sort();
    html+=`<div style="background:var(--card);border:1px solid rgba(212,240,0,.2);border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem">
        <div>
          <div class="cl">📅 Próxima Jornada</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px">JORNADA ${nextJ.num}</div>
          <div style="font-size:.75rem;color:var(--muted2)">${nextJ.fecha||'Fecha por confirmar'}</div>
        </div>
        <button onclick="showLT('jornadas',document.querySelectorAll('.lt')[2])" style="padding:.4rem .85rem;border-radius:7px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-family:'Outfit',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer">Ver horarios →</button>
      </div>
      ${turnos.map(t=>`<div style="margin-bottom:.55rem">
        <div style="font-size:.65rem;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:.3rem">${t}</div>
        <div style="display:flex;flex-wrap:wrap;gap:.3rem">
          ${byTurno[t].sort((a,b)=>a.grupo-b.grupo).map(({grupo,cancha})=>{
            const gps=S.players.filter(p=>p.liga===lid&&p.grupo===grupo).slice(0,4);
            return`<div style="background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:.35rem .6rem;font-size:.72rem">
              <span style="font-family:'Bebas Neue',sans-serif;color:var(--accent);font-size:.9rem">G${grupo}</span>
              <span style="color:var(--muted2);margin:0 .3rem">·</span>
              <span style="color:var(--muted2)">${cancha}</span>
              <div style="font-size:.65rem;color:var(--muted2);margin-top:.1rem">${gps.map(p=>p.nombre.split(' ')[0]).join(' · ')}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`).join('')}
    </div>`;
  }

  // ÚLTIMOS RESULTADOS
  if(lastJ){
    const ms=S.partidos.filter(p=>p.jornadaId===lastJ.id&&p.finalizado&&p.gA!==null);
    const grupos=[...new Set(ms.map(m=>m.grupo))].sort((a,b)=>a-b).slice(0,3);
    html+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
        <div>
          <div class="cl">⚡ Últimos Resultados</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px">JORNADA ${lastJ.num}</div>
          <div style="font-size:.75rem;color:var(--muted2)">${lastJ.fecha||''}</div>
        </div>
        <button onclick="showLT('jornadas',document.querySelectorAll('.lt')[2])" style="padding:.4rem .85rem;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:'Outfit',sans-serif;font-size:.75rem;cursor:pointer">Ver todos →</button>
      </div>
      ${grupos.map(g=>{
        const gms=ms.filter(m=>m.grupo===g).slice(0,1);
        if(!gms.length)return'';
        const m=gms[0];const wA=m.gA>m.gB;const wB=m.gB>m.gA;
        return`<div style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:.55rem .75rem;margin-bottom:.35rem;font-size:.78rem">
          <div style="font-size:.6rem;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:.3rem">G${g} · Set ${m.set}</div>
          <div style="display:flex;align-items:center;gap:.5rem">
            <span style="flex:1;text-align:right;font-weight:${wA?700:400}">${pFirst(m.a1)} / ${pFirst(m.a2)}</span>
            <span style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;background:${wA?'var(--accent)':'var(--card)'};color:${wA?'var(--black)':'var(--text)'};padding:0 5px;border-radius:3px">${m.gA}</span>
            <span style="color:var(--muted)">—</span>
            <span style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;background:${wB?'var(--accent)':'var(--card)'};color:${wB?'var(--black)':'var(--text)'};padding:0 5px;border-radius:3px">${m.gB}</span>
            <span style="flex:1;font-weight:${wB?700:400}">${pFirst(m.b1)} / ${pFirst(m.b2)}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // TOP 5
  html+=`<div class="cl" style="margin-bottom:.65rem">🏆 Top 5 Tabla General</div>`;
  html+=st.slice(0,5).map((s,i)=>{
    const rankColor=i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'var(--muted)';
    const rowClass=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const pct=Math.max(8,Math.min(100,((s.total+30)/60)*100));
    return`<div class="top10-row ${rowClass}" onclick="openPlayer('${s.player.id}','${lid}')">
      <span class="top10-rank" style="color:${rankColor}">${i+1}</span>
      <div class="top10-av">${s.player.nombre[0]}</div>
      <div class="top10-info">
        <div class="top10-name">${s.player.nombre}</div>
        <div style="display:flex;align-items:center;gap:.5rem;margin-top:.3rem">
          <div class="bar-container"><div class="bar-fill" style="width:${pct}%"></div></div>
          <span style="font-size:.65rem;color:var(--muted2)">G${s.player.grupo}</span>
        </div>
      </div>
      <span class="top10-pts" style="color:${s.total>=0?'var(--accent)':'var(--accent2)'}">${s.total>0?'+':''}${s.total}</span>
    </div>`;
  }).join('');

  html+=`<div style="text-align:center;margin-top:.85rem">
    <button onclick="showLT('tabla',document.querySelectorAll('.lt')[1])" style="padding:.45rem 1.2rem;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:'Outfit',sans-serif;font-size:.78rem;cursor:pointer">
      Ver tabla completa (${st.length} jugadores) →
    </button>
  </div>`;

  el.innerHTML=html;
}

// TABLA GENERAL
function renderTabla(lid){
  const liga=S.ligas.find(l=>l.id===lid);
  const js=S.jornadas.filter(j=>j.liga===lid).sort((a,b)=>a.num-b.num);
  const st=calcGlobal(lid);

  // Headers
  const thead=document.getElementById('tabla-thead');
  if(thead) thead.innerHTML='<tr><th>#</th><th>Jugador</th><th>Gr</th>'+js.map(j=>`<th>J${j.num}</th>`).join('')+'<th class="acc">Total</th></tr>';

  const body=document.getElementById('tabla-body');
  if(!body)return;
  body.innerHTML=st.map((s,i)=>{
    const jCells=js.map(j=>{
      const pts=calcPts(s.player.id,lid,j.id);
      if(pts===null)return`<td style="color:var(--muted)">—</td>`;
      return`<td class="${pts>0?'pv':pts<0?'nv':''}">${pts>0?'+':''}${pts}</td>`;
    }).join('');
    return`<tr class="${i===0?'top1':''}" onclick="openPlayer('${s.player.id}','${lid}')">
      <td class="pos">${i+1}</td>
      <td style="font-weight:600">${s.player.nombre}</td>
      <td><span class="gr">G${s.player.grupo}</span></td>
      ${jCells}
      <td class="tot ${s.total>=0?'pv':'nv'}">${s.total>0?'+':''}${s.total}</td>
    </tr>`;
  }).join('');
}

// JORNADAS
function renderJornadas(lid){
  const el=document.getElementById('jornadas-list');
  if(!el)return;
  const js=S.jornadas.filter(j=>j.liga===lid).sort((a,b)=>b.num-a.num);
  if(!js.length){
    el.innerHTML='<div class="empty-state"><div>📅</div><p>Sin jornadas registradas</p></div>';
    return;
  }
  el.innerHTML=js.map(j=>{
    const ms=S.partidos.filter(p=>p.jornadaId===j.id);
    const fin=ms.filter(m=>m.finalizado&&m.gA!==null).length;
    const hasResults=fin>0;
    const allDone=ms.length>0&&fin===ms.length;
    const badge=allDone?`<span class="jc-badge jc-done">Completa</span>`:
      hasResults?`<span class="jc-badge jc-pending">${fin}/${ms.length} sets</span>`:
      ms.length?`<span class="jc-badge jc-empty">Sin resultados</span>`:
      `<span class="jc-badge jc-empty">Por jugarse</span>`;
    return`<div class="jornada-card">
      <div class="jc-header" onclick="toggleJornada('${j.id}')">
        <div>
          <div class="jc-title">JORNADA ${j.num}</div>
          <div class="jc-meta">${j.fecha||'Fecha por confirmar'} · ${(j.turnos||[]).join(' · ')}</div>
        </div>
        ${badge}
      </div>
      <div class="jc-body" id="jb-${j.id}">
        ${hasResults?renderJornadaBody(j.id,lid):`<div class="jc-empty-msg">⏳ Aún no hay resultados para esta jornada</div>`}
      </div>
    </div>`;
  }).join('');
}

function toggleJornada(jId){
  const el=document.getElementById('jb-'+jId);
  if(!el)return;
  el.classList.toggle('open');
}

function renderJornadaBody(jId,lid){
  const ms=S.partidos.filter(p=>p.jornadaId===jId&&p.finalizado&&p.gA!==null).sort((a,b)=>a.grupo-b.grupo||a.set-b.set);
  if(!ms.length)return`<div class="jc-empty-msg">⏳ Aún no hay resultados</div>`;
  const grupos=[...new Set(ms.map(m=>m.grupo))].sort((a,b)=>a-b);
  return grupos.map(g=>{
    const gms=ms.filter(m=>m.grupo===g);
    return`<div class="grupo-block">
      <div class="grupo-title">GRUPO ${g} · ${gms[0]?.cancha||''} · ${gms[0]?.turno||''}</div>
      ${gms.map(m=>{
        const wA=m.gA>m.gB,wB=m.gB>m.gA;
        return`<div style="margin-bottom:.55rem">
          <div class="set-label">Set ${m.set}</div>
          <div class="set-row">
            <div class="set-team-a">
              <div style="font-weight:600;font-size:.82rem">${pFirst(m.a1)}</div>
              <div style="font-size:.7rem;color:var(--muted2)">${pFirst(m.a2)}</div>
            </div>
            <span class="set-sc ${wA?'win':''}">${m.gA}</span>
            <span class="set-dash">—</span>
            <span class="set-sc ${wB?'win':''}">${m.gB}</span>
            <div class="set-team-b">
              <div style="font-weight:600;font-size:.82rem">${pFirst(m.b1)}</div>
              <div style="font-size:.7rem;color:var(--muted2)">${pFirst(m.b2)}</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

// PLAYER MODAL
function openPlayer(pid,lid){
  const p=pById(pid);
  if(!p)return;
  const total=calcTotal(pid,lid);
  const js=S.jornadas.filter(j=>j.liga===lid).sort((a,b)=>a.num-b.num);
  const st=calcGlobal(lid);
  const rank=st.findIndex(x=>x.player.id===pid)+1;

  document.getElementById('modal-content').innerHTML=`
    <h2>${p.nombre.split(' ')[0]} <em>${p.nombre.split(' ').slice(1).join(' ')}</em></h2>
    <div style="display:flex;gap:.65rem;flex-wrap:wrap;margin-bottom:1.1rem">
      <span style="font-size:.75rem;color:var(--muted2)">Grupo ${p.grupo} · ${p.cat||''}</span>
      <span style="font-size:.75rem;color:var(--accent);font-weight:700">#${rank} en tabla</span>
    </div>
    <div style="display:flex;gap:.65rem;margin-bottom:1.2rem">
      <div style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.75rem;text-align:center">
        <div style="font-size:.62rem;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:.25rem">Total</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:${total>=0?'var(--accent)':'var(--accent2)'}">${total>0?'+':''}${total}</div>
      </div>
      <div style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.75rem;text-align:center">
        <div style="font-size:.62rem;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:.25rem">Ranking</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--text)">#${rank}</div>
      </div>
    </div>
    <div class="cl" style="margin-bottom:.55rem">Historial por jornada</div>
    ${js.map(j=>{
      const pts=calcPts(pid,lid,j.id);
      const bar=pts!==null?`<div style="display:flex;align-items:center;gap:.5rem;margin-top:.25rem"><div class="bar-container" style="height:5px"><div class="bar-fill" style="width:${Math.max(0,Math.min(100,((pts+12)/24)*100))}%;background:${pts>=0?'var(--accent)':'var(--accent2)'}"></div></div></div>`:'';
      return`<div style="display:flex;align-items:center;gap:.65rem;padding:.45rem 0;border-bottom:1px solid var(--border)">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted);min-width:24px">J${j.num}</span>
        <span style="font-size:.78rem;color:var(--muted2);flex:1">${j.fecha||''}</span>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:${pts===null?'var(--muted)':pts>=0?'var(--accent)':'var(--accent2)'}">${pts===null?'—':pts>0?'+'+pts:pts}</span>
      </div>`;
    }).join('')}`;

  document.getElementById('player-modal').classList.add('open');
}
function closeModal(){document.getElementById('player-modal').classList.remove('open');}
document.getElementById('player-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
</body>
</html>
